name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.6

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install
      - name: Run lint
        run: bun run ci:lint

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Create production audit manifest
        run: |
          set -euo pipefail
          audit_dir="$(mktemp -d)"
          echo "AUDIT_DIR=$audit_dir" >> "$GITHUB_ENV"
          node - "$audit_dir" <<'EOF'
          const fs = require('node:fs');
          const outputDir = process.argv[2];
          const auditPackage = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          delete auditPackage.devDependencies;

          fs.writeFileSync(`${outputDir}/package.json`, `${JSON.stringify(auditPackage, null, 2)}\n`);
          EOF

      - name: Install production audit graph
        working-directory: ${{ env.AUDIT_DIR }}
        run: bun install --ignore-scripts

      - name: Run production dependency audit
        working-directory: ${{ env.AUDIT_DIR }}
        run: bun audit --audit-level=high

  typecheck:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install
      - name: Run typecheck
        run: bun run typecheck
      - name: Use .env.example as .env
        run: cp .env.example .env
      - name: Run build
        run: bun run build

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install
      - name: Run unit tests
        run: bun run test:unit

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: unit-test
    env:
      CI: true
      DATABASE_URL: postgres://postgres:password@127.0.0.1:5432/second-brain
    services:
      postgres:
        image: postgres:17
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: second-brain
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install
      - name: Prepare Playwright environment
        run: cp .env.example .env.test
      - name: Wait for Postgres to be ready
        run: |
          set -euo pipefail
          echo "⏳ Waiting for Postgres on localhost:5432…"
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres && break
            sleep 1
          done
          pg_isready -h 127.0.0.1 -p 5432 -U postgres || (echo "❌ Postgres did not become ready in time" && exit 1)
          echo "✅ Postgres is accepting connections!"
      - name: Run migrations
        run: bun run db:migrate
      - name: Install Playwright browsers
        run: bun run playwright install --with-deps chromium
      - name: Run end-to-end tests
        run: bun run test:e2e

  detect-db-migration-changes:
    name: Detect DB Migration Changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DB migration-related changes
        id: filter
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(drizzle/|src/server/db/schema\.ts$|drizzle\.config\.ts$)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # Tests DB migrations for production build
  test-db-migration-build:
    name: Test DB Migration
    runs-on: ubuntu-latest
    needs: detect-db-migration-changes
    if: needs.detect-db-migration-changes.outputs.should_run == 'true'
    services:
      postgres:
        image: postgres:17
        # expose 5432 on the VM so "localhost:5432" works
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: second_brain_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 10
    env:
      NODE_ENV: production
      # point at localhost now that we've mapped the port
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/second_brain_test
      SKIP_ENV_VALIDATION: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install
      - name: Wait for Postgres to be ready
        run: |
          set -euo pipefail
          echo "⏳ Waiting for Postgres on localhost:5432…"
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres && break
            sleep 1
          done
          pg_isready -h 127.0.0.1 -p 5432 -U postgres || (echo "❌ Postgres did not become ready in time" && exit 1)
          echo "✅ Postgres is accepting connections!"

      - name: Build (migrations + production build)
        run: bun run build
